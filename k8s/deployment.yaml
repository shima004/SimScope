apiVersion: apps/v1
kind: Deployment
metadata:
  name: simscope
  labels:
    app: simscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simscope
  template:
    metadata:
      labels:
        app: simscope
    spec:
      containers:
        - name: simscope
          image: shimapaca/simscope:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
